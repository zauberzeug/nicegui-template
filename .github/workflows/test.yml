name: Run Tests

on: [push]

jobs:
  code-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: code checks
    steps:
      - uses: actions/checkout@v4
      - name: set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: install Python
        run: uv python install 3.11
      - name: install dependencies
        run: uv sync --locked
      - run: uv run ruff check .
        id: ruff
        continue-on-error: true
      - run: uv run mypy .
        id: mypy
        continue-on-error: true
      - run: uv run pylint .
        id: pylint
        continue-on-error: true
      - name: check results
        if: always()
        run: |
          echo "| Tool | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ruff | ${{ steps.ruff.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| mypy | ${{ steps.mypy.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pylint | ${{ steps.pylint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.ruff.outcome }}" = "failure" ] || \
             [ "${{ steps.mypy.outcome }}" = "failure" ] || \
             [ "${{ steps.pylint.outcome }}" = "failure" ]; then
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: install Python
        run: uv python install 3.11
      - name: install dependencies
        run: |
          pipx install poetry
          uv sync --locked
      - name: pytest
        run: uv run pytest
